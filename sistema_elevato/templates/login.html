<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevato L&O - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="login-container">
        <div class="logo-title">ELEVATO L&O</div>
        <div class="logo-subtitle">BEM VINDO</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/" method="POST">
            <div class="input-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" placeholder="INSIRA SEU EMAIL" required>
            </div>

            <div class="input-group">
                <label for="senha">SENHA</label>
                <input type="password" id="senha" name="senha" placeholder="INSIRA SUA SENHA" required>
            </div>

            <button type="submit" class="btn-login">ENTRAR</button>
            
            <a href="#" class="forgot-password">ESQUECEU SUA SENHA?</a>
        </form>

        <div class="footer-tag">@ELEVATOL&O</div>
    </div>

</body>
</html>
